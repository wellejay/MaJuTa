# SwiftLint configuration for MaJuTa
# SwiftUI + MVVM iOS project — Xcode 15 / Swift 5.9

included:
  - MaJuTa
  - MaJuTaTests

excluded:
  - MaJuTa.xcodeproj
  - .build
  - DerivedData
  - Pods
  - MaJuTa/Resources

opt_in_rules:
  - force_cast
  - force_try
  - empty_catch
  - large_tuple
  - cyclomatic_complexity
  - overridden_super_call
  - redundant_nil_coalescing
  - unused_import
  - vertical_whitespace_closing_braces

disabled_rules:
  - trailing_whitespace
  - todo
  - nesting
  - type_body_length
  - file_length
  - identifier_name

line_length:
  warning: 150
  error: 200
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 60
  error: 100

function_parameter_count:
  warning: 6
  error: 8

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60

cyclomatic_complexity:
  warning: 10
  error: 15

large_tuple:
  warning: 3
  error: 4

custom_rules:
  no_print_in_release:
    name: "No print() in production code"
    regex: '(?<!\/\/.*)\bprint\('
    included: ".*\\.swift"
    excluded: ".*Tests\\.swift"
    message: "Use a proper Logger instead of print(). Remove before shipping."
    severity: warning
