name: MaJuTa
options:
  bundleIdPrefix: com.majuta
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  developmentLanguage: ar
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  SWIFT_VERSION: "5.9"
  MARKETING_VERSION: "2.1.0"
  CURRENT_PROJECT_VERSION: "2"
  SWIFT_EMIT_LOC_STRINGS: YES
  ENABLE_USER_SCRIPT_SANDBOXING: YES
  ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

targets:
  MaJuTa:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MaJuTa
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.majuta.app
      INFOPLIST_FILE: MaJuTa/Resources/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      TARGETED_DEVICE_FAMILY: "1"
      SUPPORTS_MACCATALYST: NO
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Automatic
      SWIFT_VERSION: "5.9"
      ENABLE_PREVIEWS: YES
    capabilities:
      com.apple.developer.icloud-container-identifiers:
        - iCloud.com.majuta.app
      com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.majuta.app
    entitlements:
      path: MaJuTa/Resources/MaJuTa.entitlements
    plist:
      path: MaJuTa/Resources/Info.plist
      properties:
        CFBundleName: MaJuTa
        CFBundleDisplayName: MaJuTa
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSApplicationCategoryType: Utilities
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: YES
        NSCameraUsageDescription: "نحتاج الكاميرا لمسح الفواتير والإيصالات"
        NSFaceIDUsageDescription: "استخدام Face ID لحماية بياناتك المالية"
        UIUserInterfaceStyle: Automatic
        UIAppFonts:
          - SaudiRiyal.ttf
        NSUbiquitousContainers:
          iCloud.com.majuta.app:
            NSUbiquitousContainerIsDocumentScopePublic: YES
            NSUbiquitousContainerName: MaJuTa
            NSUbiquitousContainerSupportedFolderLevels: Any

  MaJuTaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MaJuTaTests
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.majuta.tests
    dependencies:
      - target: MaJuTa
